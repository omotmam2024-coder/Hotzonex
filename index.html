/* ============================================================
   AUTH SCREEN  (login page)
   ============================================================ */
function Auth({ client }){
  const [mode,setMode] = useState("signin");
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [busy,setBusy] = useState(false);
  const [msg,setMsg] = useState(null);
  const [err,setErr] = useState(null);

  async function submit(){
    setErr(null); setMsg(null); setBusy(true);
    try{
      if(mode==="signin"){
        const { error } = await client.auth.signInWithPassword({ email, password:pw });
        if(error) throw error;
      } else {
        const { data, error } = await client.auth.signUp({ email, password:pw });
        if(error) throw error;
        if(data?.user && !data?.session)
          setMsg("Account created. Check your email to confirm, then sign in.");
        else setMsg("Account created.");
        setMode("signin");
      }
    }catch(e){ setErr(e.message || "Something went wrong"); }
    finally{ setBusy(false); }
  }

  return (
    <Centered>
      <div className="card fade-in" style={{maxWidth:430,width:"100%",padding:"36px 34px"}}>
        <Brand/>
        <h2 className="display" style={{margin:"22px 0 4px",fontSize:23}}>
          {mode==="signin" ? "Sign in" : "Create account"}
        </h2>
        <p style={{color:"var(--muted)",fontSize:14,marginTop:0}}>
          Access to the tracker is protected — please authenticate.
        </p>

        <div style={{display:"flex",flexDirection:"column",gap:14,marginTop:20}}>
          <div className="field">
            <label>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="you@business.com"/>
          </div>
          <div className="field">
            <label>Password</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="••••••••"/>
          </div>

          {err && <div style={{color:"var(--rose)",fontSize:13.5,fontWeight:600}}>{err}</div>}
          {msg && <div style={{color:"var(--signal)",fontSize:13.5,fontWeight:600}}>{msg}</div>}

          <button className="btn primary" onClick={submit} disabled={busy||!email||!pw}>
            {busy ? <span className="spin"/> : (mode==="signin"?"Sign in":"Sign up")}
          </button>

          <div style={{textAlign:"center",fontSize:13.5,color:"var(--muted)"}}>
            {mode==="signin" ? "No account yet? " : "Already have an account? "}
            <span style={{color:"var(--signal)",fontWeight:700,cursor:"pointer"}}
              onClick={()=>{setMode(mode==="signin"?"signup":"signin");setErr(null);setMsg(null);}}>
              {mode==="signin" ? "Create one" : "Sign in"}
            </span>
          </div>
        </div>
      </div>
    </Centered>
  );
}

/* ============================================================
   APP SHELL (authenticated)
   ============================================================ */
function Shell({ client, session }){
  const [view,setView]   = useState("dashboard");
  const [year,setYear]   = useState(2026);
  const [daily,setDaily] = useState([]);     // raw rows for the year
  const [loading,setLoading] = useState(true);
  const [toast,setToast] = useState(null);
  const uid = session.user.id;

  const flash = (t)=>{ setToast(t); setTimeout(()=>setToast(null),2600); };

  const load = useCallback(async ()=>{
    setLoading(true);
    const { data, error } = await client
      .from("daily_entries").select("*")
      .eq("yr", year).order("entry_date");
    if(!error) setDaily(data||[]);
    setLoading(false);
  },[client,year]);

  useEffect(()=>{ load(); },[load]);

  /* derived rollups (computed live from the same numbers the DB computes) */
  const byMonth = useMemo(()=>{
    const m = Array.from({length:12},(_,i)=>({mo:i+1,income:0,total_expenses:0,net_profit:0,days:0}));
    daily.forEach(r=>{
      const x = m[r.mo-1];
      x.income+=Number(r.income); x.total_expenses+=Number(r.total_expenses);
      x.net_profit+=Number(r.net_profit); x.days++;
    });
    return m;
  },[daily]);

  const annual = useMemo(()=> byMonth.reduce((a,m)=>({
    income:a.income+m.income, total_expenses:a.total_expenses+m.total_expenses,
    net_profit:a.net_profit+m.net_profit, days:a.days+m.days
  }),{income:0,total_expenses:0,net_profit:0,days:0}),[byMonth]);

  async function importSeed(){
    const rows = SEED.map(([d,inc,net,pf,fe,wg])=>({
      user_id:uid, entry_date:d, income:inc, internet_exp:net,
      power_fuel:pf, feeding:fe, daily_wages:wg
    }));
    const { error } = await client.from("daily_entries")
      .upsert(rows,{onConflict:"user_id,entry_date"});
    if(error) flash("Import failed: "+error.message);
    else { flash("Imported "+rows.length+" days from the workbook"); load(); }
  }

  const nav = [
    ["dashboard","Dashboard",Ic.grid],
    ["entry","Daily Entry",Ic.plus],
    ["monthly","Monthly",Ic.cal],
    ["annual","Annual",Ic.chart],
  ];

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {/* top bar */}
      <header style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"16px 26px",borderBottom:"1px solid var(--line)",
        position:"sticky",top:0,zIndex:20,backdropFilter:"blur(10px)",
        background:"rgba(10,14,20,.72)"}}>
        <Brand small/>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span className="pill" style={{background:"rgba(33,230,193,.12)",color:"var(--signal)"}}>
            <span className="live" style={{marginRight:6}}>●</span>Live · Supabase
          </span>
          <select value={year} onChange={e=>setYear(Number(e.target.value))}
            style={{background:"var(--panel-2)",color:"var(--text)",border:"1px solid var(--line)",
              borderRadius:10,padding:"8px 12px",fontWeight:600}}>
            {[2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <div title={session.user.email} style={{
            width:36,height:36,borderRadius:"50%",display:"grid",placeItems:"center",
            background:"linear-gradient(135deg,var(--signal),var(--blue))",color:"#04130f",
            fontWeight:800,fontSize:14}}>
            {session.user.email[0].toUpperCase()}
          </div>
          <button className="btn ghost" style={{padding:"9px 12px"}} title="Sign out"
            onClick={()=>client.auth.signOut()}><Ic.out/></button>
        </div>
      </header>

      <div style={{display:"flex",flex:1,minHeight:0}}>
        {/* sidebar */}
        <nav style={{width:216,borderRight:"1px solid var(--line)",padding:"22px 14px",
          display:"flex",flexDirection:"column",gap:6}}>
          {nav.map(([k,label,Icon])=>(
            <button key={k} onClick={()=>setView(k)} className="btn ghost"
              style={{justifyContent:"flex-start",border:"none",
                background: view===k ? "var(--panel-2)":"transparent",
                color: view===k ? "var(--signal)":"var(--muted)",fontWeight:600}}>
              <Icon/> {label}
            </button>
          ))}
          <div style={{flex:1}}/>
          <button className="btn ghost" style={{justifyContent:"flex-start",fontSize:13,color:"var(--muted-2)"}}
            onClick={importSeed}>Import 2026 workbook data</button>
        </nav>

        {/* content */}
        <main style={{flex:1,minWidth:0,padding:"26px 30px",overflow:"auto"}}>
          {loading
            ? <div style={{display:"grid",placeItems:"center",height:"60vh",color:"var(--muted)"}}>
                <span className="spin" style={{borderTopColor:"var(--signal)"}}/></div>
            : <div className="fade-in" key={view}>
                {view==="dashboard" && <Dashboard year={year} annual={annual} byMonth={byMonth} daily={daily}/>}
                {view==="entry"     && <DailyEntry client={client} uid={uid} daily={daily} year={year}
                                          onSaved={(t)=>{flash(t);load();}}/>}
                {view==="monthly"   && <Monthly daily={daily} year={year}/>}
                {view==="annual"    && <Annual byMonth={byMonth} annual={annual} year={year}/>}
              </div>}
        </main>
      </div>

      {toast && <div className="toast fade-in">{toast}</div>}
    </div>
  );
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function Dashboard({ year, annual, byMonth, daily }){
  const margin = annual.income>0 ? (annual.net_profit/annual.income*100) : 0;
  const recent = [...daily].reverse().slice(0,6);
  return (
    <div>
      <PageHead title={"Business overview"} sub={year+" · Hotzonex WiFi"}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:16}}>
        <Kpi label="Total Income" value={annual.income} accent="var(--blue)"/>
        <Kpi label="Total Expenses" value={annual.total_expenses} accent="var(--rose)"/>
        <Kpi label="Net Profit" value={annual.net_profit} accent="var(--gold)" big/>
        <Kpi label="Profit Margin" value={margin} suffix="%" accent="var(--signal)" raw/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1.6fr 1fr",gap:18,marginTop:20}}>
        <div className="card" style={{padding:"22px 24px"}}>
          <SectionTitle>Monthly net profit</SectionTitle>
          <BarChart data={byMonth}/>
        </div>
        <div className="card" style={{padding:"22px 24px"}}>
          <SectionTitle>Recent days</SectionTitle>
          {recent.length===0
            ? <Empty/>
            : <div style={{display:"flex",flexDirection:"column",gap:2,marginTop:6}}>
                {recent.map(r=>(
                  <div key={r.id} style={{display:"flex",justifyContent:"space-between",
                    alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--line-soft)"}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{r.entry_date}</div>
                      <div className="mono" style={{fontSize:12,color:"var(--muted)"}}>
                        in {fmt(r.income)} · exp {fmt(r.total_expenses)}</div>
                    </div>
                    <div className="mono" style={{fontWeight:700,
                      color: r.net_profit>=0?"var(--gold)":"var(--rose)"}}>
                      {fmt(r.net_profit)}</div>
                  </div>
                ))}
              </div>}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   DAILY ENTRY — inputs; DB auto-computes totals; edit + delete
   ============================================================ */
function DailyEntry({ client, uid, daily, year, onSaved }){
  const today = new Date().toISOString().slice(0,10);
  const init = today.startsWith(String(year)) ? today : year+"-01-01";
  const [date,setDate] = useState(init);
  const [f,setF] = useState({income:"",internet_exp:"",power_fuel:"",feeding:"",daily_wages:""});
  const [busy,setBusy] = useState(false);
  const [confirmDel,setConfirmDel] = useState(false);  // delete on the open form
  const [rowDel,setRowDel] = useState(null);           // delete from the list (entry id)
  const formRef = useRef(null);

  const blank = {income:"",internet_exp:"",power_fuel:"",feeding:"",daily_wages:""};

  // preload existing record whenever the chosen date / data changes
  useEffect(()=>{
    const ex = daily.find(r=>r.entry_date===date);
    setF(ex
      ? {income:ex.income,internet_exp:ex.internet_exp,power_fuel:ex.power_fuel,
         feeding:ex.feeding,daily_wages:ex.daily_wages}
      : blank);
    setConfirmDel(false);
  },[date,daily]);

  const num = (v)=>Number(v||0);
  const totalExp = num(f.internet_exp)+num(f.power_fuel)+num(f.feeding)+num(f.daily_wages);
  const net = num(f.income)-totalExp;
  const current = daily.find(r=>r.entry_date===date);
  const exists = !!current;

  async function save(){
    setBusy(true);
    const { error } = await client.from("daily_entries").upsert({
      user_id:uid, entry_date:date,
      income:num(f.income), internet_exp:num(f.internet_exp), power_fuel:num(f.power_fuel),
      feeding:num(f.feeding), daily_wages:num(f.daily_wages)
    },{onConflict:"user_id,entry_date"});
    setBusy(false);
    onSaved(error ? ("Error: "+error.message) : (exists?"Day updated":"Day saved"));
  }

  async function remove(id, label){
    setBusy(true);
    const { error } = await client.from("daily_entries").delete().eq("id", id);
    setBusy(false);
    setConfirmDel(false); setRowDel(null);
    if(!error && label) setF(blank);
    onSaved(error ? ("Error: "+error.message) : "Entry deleted"+(label?(" — "+label):""));
  }

  function editRow(r){
    setDate(r.entry_date);
    if(formRef.current) formRef.current.scrollIntoView({behavior:"smooth",block:"start"});
  }

  const inputs = [
    ["income","Income (SSP)","var(--blue)"],
    ["internet_exp","Internet Exp.","var(--rose)"],
    ["power_fuel","Power / Fuel","var(--rose)"],
    ["feeding","Feeding / Maintenance","var(--rose)"],
    ["daily_wages","Daily Wages","var(--rose)"],
  ];

  const list = [...daily].sort((a,b)=>a.entry_date<b.entry_date?1:-1);

  return (
    <div style={{maxWidth:820}}>
      <PageHead title="Daily entry" sub="Add, edit or delete a day — totals are calculated automatically"/>

      {/* ---------- the form ---------- */}
      <div className="card" style={{padding:"26px 28px"}} ref={formRef}>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",
          gap:16,flexWrap:"wrap",marginBottom:22}}>
          <div className="field" style={{maxWidth:240,marginBottom:0}}>
            <label>Date</label>
            <input type="date" value={date} min={year+"-01-01"} max={year+"-12-31"}
              onChange={e=>setDate(e.target.value)}/>
          </div>
          <span className="pill" style={{background: exists?"rgba(246,196,83,.14)":"rgba(33,230,193,.12)",
            color: exists?"var(--gold)":"var(--signal)"}}>
            {exists ? "Editing existing day" : "New day"}
          </span>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16}}>
          {inputs.map(([k,label,c])=>(
            <div className="field" key={k}>
              <label style={{color:c}}>{label}</label>
              <input className="num" inputMode="numeric" value={f[k]}
                onChange={e=>setF({...f,[k]:e.target.value.replace(/[^\d.]/g,"")})}
                placeholder="0"/>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:16,marginTop:24,flexWrap:"wrap"}}>
          <Computed label="Total Expenses" value={totalExp} color="var(--rose)"/>
          <Computed label="Net Profit" value={net} color={net>=0?"var(--gold)":"var(--rose)"}/>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:12,marginTop:24,flexWrap:"wrap"}}>
          <button className="btn primary" onClick={save} disabled={busy}>
            {busy ? <span className="spin"/> : (exists?<><Ic.edit/> Update day</>:<><Ic.plus/> Save day</>)}
          </button>

          {exists && !confirmDel &&
            <button className="btn" style={{borderColor:"var(--rose)",color:"var(--rose)"}}
              onClick={()=>setConfirmDel(true)} disabled={busy}>
              <Ic.trash/> Delete</button>}

          {exists && confirmDel &&
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"var(--rose)",fontWeight:600}}>Delete this day?</span>
              <button className="btn" style={{background:"var(--rose)",border:"none",color:"#160606"}}
                onClick={()=>remove(current.id, date)} disabled={busy}>Yes, delete</button>
              <button className="btn ghost" onClick={()=>setConfirmDel(false)} disabled={busy}>Cancel</button>
            </div>}

          {!confirmDel &&
            <button className="btn ghost" onClick={()=>setDate(init)} disabled={busy}
              title="Reset to today">Clear</button>}
        </div>
      </div>

      {/* ---------- saved entries with edit / delete ---------- */}
      <div style={{marginTop:24}}>
        <SectionTitle>Saved days · {year} ({list.length})</SectionTitle>
        <div className="card" style={{padding:"6px 6px 8px",overflowX:"auto"}}>
          {list.length===0
            ? <Empty/>
            : <table>
                <thead><tr>
                  <th>Date</th><th>Income</th><th>Total Exp.</th><th>Net Profit</th><th style={{textAlign:"right"}}>Actions</th>
                </tr></thead>
                <tbody>
                  {list.map(r=>(
                    <tr key={r.id} style={r.entry_date===date?{background:"rgba(246,196,83,.06)"}:null}>
                      <td style={{fontWeight:600}}>{r.entry_date}</td>
                      <td className="mono">{fmt(r.income)}</td>
                      <td className="mono" style={{color:"var(--muted)"}}>{fmt(r.total_expenses)}</td>
                      <td className="mono" style={{color:r.net_profit>=0?"var(--gold)":"var(--rose)",fontWeight:700}}>
                        {fmt(r.net_profit)}</td>
                      <td>
                        {rowDel===r.id
                          ? <span style={{display:"inline-flex",gap:8,alignItems:"center",justifyContent:"flex-end"}}>
                              <button className="btn" style={{padding:"6px 10px",fontSize:12,background:"var(--rose)",border:"none",color:"#160606"}}
                                onClick={()=>remove(r.id, r.entry_date)} disabled={busy}>Confirm</button>
                              <button className="btn ghost" style={{padding:"6px 10px",fontSize:12}}
                                onClick={()=>setRowDel(null)}>Cancel</button>
                            </span>
                          : <span style={{display:"inline-flex",gap:6,justifyContent:"flex-end"}}>
                              <button className="btn ghost" style={{padding:"7px 9px"}} title="Edit"
                                onClick={()=>editRow(r)}><Ic.edit/></button>
                              <button className="btn ghost" style={{padding:"7px 9px",color:"var(--rose)"}} title="Delete"
                                onClick={()=>setRowDel(r.id)}><Ic.trash/></button>
                            </span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   MONTHLY — day-by-day grid with weekly + monthly totals
   ============================================================ */
function Monthly({ daily, year }){
  const [mo,setMo] = useState(()=>{ const m=new Date().getMonth()+1; return m; });
  const rows = daily.filter(r=>r.mo===mo).sort((a,b)=>a.dy-b.dy);
  const daysInMonth = new Date(year,mo,0).getDate();

  // build week buckets matching the workbook (1-7, 8-14, ...)
  const weeks = [];
  for(let d=1; d<=daysInMonth; d++){
    const wk = Math.floor((d-1)/7);
    (weeks[wk]=weeks[wk]||[]).push(d);
  }
  const rec = (d)=> rows.find(r=>r.dy===d);
  const sum = (arr,key)=>arr.reduce((a,d)=>a+Number(rec(d)?.[key]||0),0);
  const monthTotal = (key)=>rows.reduce((a,r)=>a+Number(r[key]),0);

  const cols = ["income","internet_exp","power_fuel","feeding","daily_wages","total_expenses","net_profit"];
  const head = ["Date","Income","Internet","Power/Fuel","Feeding","Wages","Total Exp.","Net Profit"];

  return (
    <div>
      <PageHead title="Monthly tracking" sub={MONTHS[mo-1]+" "+year}/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {MONTHS.map((m,i)=>(
          <button key={m} onClick={()=>setMo(i+1)} className="btn ghost"
            style={{padding:"7px 13px",fontSize:13,
              background: mo===i+1?"var(--panel-2)":"transparent",
              color: mo===i+1?"var(--signal)":"var(--muted)",
              borderColor: mo===i+1?"var(--signal-dim)":"var(--line)"}}>
            {m.slice(0,3)}</button>
        ))}
      </div>

      <div className="card" style={{padding:"6px 6px 10px",overflowX:"auto"}}>
        <table>
          <thead><tr>{head.map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {weeks.map((days,wi)=>(
              <React.Fragment key={wi}>
                {days.map(d=>{
                  const r = rec(d);
                  return (
                    <tr key={d}>
                      <td style={{color:"var(--muted)"}}>{MONTHS[mo-1].slice(0,3)} {d}</td>
                      {cols.map(c=>(
                        <td key={c} className="mono"
                          style={{color:c==="net_profit"?(Number(r?.[c]||0)>=0?"var(--gold)":"var(--rose)")
                            : c==="income"?"var(--text)":"var(--muted)"}}>
                          {r ? fmt(r[c]) : "—"}</td>
                      ))}
                    </tr>
                  );
                })}
                <tr className="row-week">
                  <td>Week {wi+1} total</td>
                  {cols.map(c=><td key={c} className="mono">{fmt(sum(days,c))}</td>)}
                </tr>
              </React.Fragment>
            ))}
            <tr className="row-total">
              <td>{MONTHS[mo-1]} total</td>
              {cols.map(c=>(
                <td key={c} className="mono"
                  style={{color:c==="net_profit"?"var(--gold)":c==="income"?"var(--blue)":undefined}}>
                  {fmt(monthTotal(c))}</td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================================================

}
function Brand({small}){
  return (
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:small?34:42,height:small?34:42,borderRadius:12,
        background:"linear-gradient(135deg,var(--signal),var(--signal-dim))",

        <Ic.wifi/>
      </div>
      <div>
        <div className="display" style={{fontWeight:800,fontSize:small?17:20,letterSpacing:"-.01em"}}>
          HOTZONEX <span style={{color:"var(--signal)"}}>WiFi</span></div>
        <div style={{fontSize:11,color:"var(--muted)",letterSpacing:".12em",textTransform:"uppercase"}}>
          Automated Tracker</div>

}
function PageHead({title,sub}){
  return <div style={{marginBottom:22}}>
    <h1 className="display" style={{margin:0,fontSize:26,letterSpacing:"-.02em"}}>{title}</h1>
    <p style={{margin:"4px 0 0",color:"var(--muted)",fontSize:14}}>{sub}</p>
  </div>;
}
function SectionTitle({children}){
  return <div style={{fontSize:12,letterSpacing:".06em",textTransform:"uppercase",
    color:"var(--muted)",fontWeight:600,marginBottom:14}}>{children}</div>;
}
function Kpi({label,value,accent,suffix,big,raw}){
  return (
    <div className="card" style={{padding:"20px 22px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:`radial-gradient(120px 80px at 100% 0,${accent}22,transparent 70%)`}}/>
      <div style={{fontSize:12.5,color:"var(--muted)",fontWeight:600,position:"relative"}}>{label}</div>
      <div className="mono" style={{fontSize:big?30:25,fontWeight:700,marginTop:8,color:accent,position:"relative",letterSpacing:"-.01em"}}>
        {raw ? value.toFixed(1) : fmt(value)}{suffix||""}

      {!raw && !suffix && <div style={{fontSize:11,color:"var(--muted-2)",marginTop:2,position:"relative"}}>SSP</div>}

}
function Computed({label,value,color}){
  return (
    <div style={{flex:1,minWidth:200,background:"var(--bg-2)",border:"1px solid var(--line)",
      borderRadius:12,padding:"16px 18px"}}>
      <div style={{fontSize:12,color:"var(--muted)",fontWeight:600}}>{label}</div>
      <div className="mono" style={{fontSize:24,fontWeight:700,color,marginTop:4}}>{ssp(value)}</div>
      <div style={{fontSize:11,color:"var(--muted-2)",marginTop:2}}>auto-calculated</div>
    </div>
  );
}
function Empty(){
  return <div style={{color:"var(--muted-2)",fontSize:14,padding:"30px 0",textAlign:"center"}}>
    No data yet. Add days in <b style={{color:"var(--muted)"}}>Daily Entry</b>.</div>;
}

/* lightweight custom SVG bar chart */
function BarChart({data,dual}){
  const W=560,H=220,pad=30,bw=W/12;
  const max = Math.max(1,...data.map(d=>Math.max(d.net_profit,dual?d.income:0,0)));
  const y = (v)=> H-pad-(Math.max(0,v)/max)*(H-pad*2);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
      {[0,.5,1].map(t=>(
        <line key={t} x1={pad} x2={W} y1={pad+(H-pad*2)*(1-t)} y2={pad+(H-pad*2)*(1-t)}
          stroke="var(--line-soft)" strokeWidth="1"/>
      ))}
      {data.map((d,i)=>{
        const cx = i*bw+pad/2;
        return (
          <g key={i}>
            {dual && <rect x={cx} y={y(d.income)} width={bw*0.34} height={H-pad-y(d.income)}
              rx="2" fill="var(--blue)" opacity=".55"/>}
            <rect x={cx+(dual?bw*0.38:bw*0.2)} y={y(d.net_profit)}
              width={bw*0.34} height={Math.max(0,H-pad-y(d.net_profit))} rx="2" fill="var(--signal)"/>
            <text x={cx+bw*0.32} y={H-10} fontSize="9" fill="var(--muted-2)" textAnchor="middle"
              fontFamily="JetBrains Mono">{MONTHS[i].slice(0,1)}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ============================================================
   ROOT — config (from top of file) -> login -> app
   ============================================================ */
function Root(){
  const cfg = getConfig();
  const [client] = useState(()=> cfg ? makeClient(cfg) : null);
  const [session,setSession] = useState(null);
  const [ready,setReady] = useState(false);

  useEffect(()=>{
    if(!client){ setReady(true); return; }
    client.auth.getSession().then(({data})=>{ setSession(data.session); setReady(true); });
    const { data:sub } = client.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[client]);

  if(!client) return <NeedsConfig/>;
  if(!ready) return <Centered><span className="spin" style={{borderTopColor:"var(--signal)"}}/></Centered>;
  if(!session) return <Auth client={client}/>;
  return <Shell client={client} session={session}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
