/* ─────────── schema SQL (embedded) ─────────── */
const SCHEMA_SQL = `
-- Drop existing objects cleanly
drop table if exists public.daily_entries cascade;

-- Main table
create table public.daily_entries (
  id             uuid primary key default gen_random_uuid(),
  user_id        uuid not null references auth.users(id) on delete cascade,
  entry_date     date not null,
  yr             int  generated always as (extract(year  from entry_date)::int) stored,
  mo             int  generated always as (extract(month from entry_date)::int) stored,
  dy             int  generated always as (extract(day   from entry_date)::int) stored,
  income         numeric(14,2) not null default 0,
  internet_exp   numeric(14,2) not null default 0,
  power_fuel     numeric(14,2) not null default 0,
  feeding        numeric(14,2) not null default 0,
  daily_wages    numeric(14,2) not null default 0,
  total_expenses numeric(14,2) generated always as
                   (internet_exp + power_fuel + feeding + daily_wages) stored,
  net_profit     numeric(14,2) generated always as
                   (income - (internet_exp + power_fuel + feeding + daily_wages)) stored,
  created_at     timestamptz default now(),
  unique(user_id, entry_date)
);

-- Views
create view public.weekly_summary as
select user_id, yr, mo,
  (floor((extract(day from entry_date)::int - 1) / 7) + 1)::int as week_num,
  sum(income) as income, sum(internet_exp) as internet_exp,
  sum(power_fuel) as power_fuel, sum(feeding) as feeding,
  sum(daily_wages) as daily_wages,
  sum(total_expenses) as total_expenses, sum(net_profit) as net_profit
from public.daily_entries
group by user_id, yr, mo, week_num;

create view public.monthly_summary as
select user_id, yr, mo,
  sum(income) as income, sum(internet_exp) as internet_exp,
  sum(power_fuel) as power_fuel, sum(feeding) as feeding,
  sum(daily_wages) as daily_wages,
  sum(total_expenses) as total_expenses, sum(net_profit) as net_profit,
  count(*) as days_recorded
from public.daily_entries group by user_id, yr, mo;

create view public.annual_summary as
select user_id, yr,
  sum(income) as income, sum(internet_exp) as internet_exp,
  sum(power_fuel) as power_fuel, sum(feeding) as feeding,
  sum(daily_wages) as daily_wages,
  sum(total_expenses) as total_expenses, sum(net_profit) as net_profit,
  count(*) as days_recorded
from public.daily_entries group by user_id, yr;

-- Row Level Security
alter table public.daily_entries enable row level security;
create policy "own_rows" on public.daily_entries
  for all using (auth.uid() = user_id) with check (auth.uid() = user_id);

-- Refresh PostgREST schema cache
notify pgrst, 'reload schema';
`.trim();

/* ─────────── LOGIN / AUTH ─────────── */
function Auth(){
  const [mode,setMode]   = useState("signin");
  const [email,setEmail] = useState("");
  const [pw,setPw]       = useState("");
  const [busy,setBusy]   = useState(false);
  const [err,setErr]     = useState(null);
  const [msg,setMsg]     = useState(null);

  async function submit(){
    setErr(null); setMsg(null); setBusy(true);
    try{
      if(mode==="signin"){
        const {data,error} = await SB.auth.signInWithPassword({email,password:pw});
        if(error) throw error;
        if(data?.user?.is_anonymous){ await SB.auth.signOut(); throw new Error("Anonymous sessions are not allowed."); }
      } else {
        const {data,error} = await SB.auth.signUp({email,password:pw});
        if(error) throw error;
        if(!data?.session) setMsg("Check your email to confirm, then sign in.");
        setMode("signin");
      }
    } catch(e){ setErr(e.message); }
    finally{ setBusy(false); }
  }

  return (
    <Center>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:32}}><Logo/></div>

        <div className="card fadein" style={{padding:"36px 32px"}}>
          <h2 className="sora" style={{fontSize:20,fontWeight:700,marginBottom:6}}>
            {mode==="signin" ? "Welcome back" : "Create account"}
          </h2>
          <p style={{color:"var(--muted)",fontSize:13.5,marginBottom:24}}>
            {mode==="signin" ? "Sign in to access your tracker." : "Register to get started."}
          </p>

          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div className="field">
              <label>Email address</label>
              <input type="email" value={email} placeholder="you@example.com"
                autoComplete="email"
                onChange={e=>setEmail(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&submit()}/>
            </div>
            <div className="field">
              <label>Password</label>
              <input type="password" value={pw} placeholder="••••••••"
                autoComplete={mode==="signin"?"current-password":"new-password"}
                onChange={e=>setPw(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&submit()}/>
            </div>

            {err && <div style={{color:"var(--red)",fontSize:13,fontWeight:600,padding:"10px 12px",background:"rgba(255,95,95,.08)",borderRadius:8,border:"1px solid rgba(255,95,95,.2)"}}>{err}</div>}
            {msg && <div style={{color:"var(--teal)",fontSize:13,fontWeight:600,padding:"10px 12px",background:"rgba(32,219,184,.08)",borderRadius:8,border:"1px solid rgba(32,219,184,.2)"}}>{msg}</div>}

            <button className="btn primary" onClick={submit} disabled={busy||!email||!pw} style={{justifyContent:"center",padding:"13px"}}>
              {busy ? <span className="spin"/> : <><I.lock width={15} height={15}/> {mode==="signin"?"Sign in":"Create account"}</>}
            </button>
          </div>

          <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"var(--muted)"}}>
            {mode==="signin" ? "No account? " : "Already registered? "}
            <span style={{color:"var(--teal)",fontWeight:700,cursor:"pointer"}}
              onClick={()=>{setMode(mode==="signin"?"signup":"signin");setErr(null);setMsg(null);}}>
              {mode==="signin" ? "Create one" : "Sign in"}
            </span>
          </div>
        </div>

        <div style={{textAlign:"center",marginTop:16,fontSize:11.5,color:"var(--muted2)"}}>
          <I.lock width={11} height={11} style={{display:"inline",verticalAlign:"middle",marginRight:4}}/>
          Secured — email &amp; password only
        </div>
      </div>
    </Center>
  );
}

          </div>
          <p style={{color:"var(--muted)",fontSize:13.5,lineHeight:1.7,marginBottom:20}}>
            Your Supabase database needs to be initialised. Copy the SQL below, paste it into
            your <strong style={{color:"var(--text)"}}>Supabase → SQL Editor</strong>, click <strong style={{color:"var(--text)"}}>Run</strong>,
            then come back and click <em style={{color:"var(--teal)"}}>I've run the SQL</em>.
          </p>

          <div style={{position:"relative",marginBottom:16}}>
            <pre style={{
              background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,
              padding:"14px 16px",fontSize:11.5,color:"var(--muted)",
              maxHeight:220,overflowY:"auto",lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word"
            }}>{SCHEMA_SQL}</pre>
            <button className="btn" onClick={copy} style={{position:"absolute",top:10,right:10,padding:"6px 12px",fontSize:12}}>
              {copied ? "✓ Copied!" : "Copy SQL"}
            </button>
          </div>

          <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
            <button className="btn primary" onClick={()=>setDone(true)} style={{padding:"12px 20px"}}>
              I've run the SQL — continue to login
            </button>
          </div>

          {done && <div style={{marginTop:16,color:"var(--teal)",fontSize:13,fontWeight:600}}>
            ✓ Reload the page now to go to the login screen.
            <button className="btn primary" style={{marginLeft:12,padding:"8px 14px",fontSize:12}}
              onClick={()=>location.reload()}>Reload now</button>
          </div>}
        </div>
      </div>
    </Center>
  );
}

/* ─────────── MAIN APP SHELL ─────────── */
function App({session}){
  const [view,setView]     = useState("dashboard");
  const [year,setYear]     = useState(new Date().getFullYear());
  const [rows,setRows]     = useState([]);
  const [loading,setLoading] = useState(true);
  const [toast,setToast]   = useState(null);
  const [dbReady,setDbReady] = useState(true);
  const uid = session.user.id;

  const flash = t => { setToast(t); setTimeout(()=>setToast(null),2800); };

  const load = useCallback(async()=>{
    setLoading(true);
    const {data,error} = await SB.from("daily_entries").select("*").eq("yr",year).order("entry_date");
    if(error){
      if(error.message && error.message.includes("schema cache")){
        setDbReady(false);
      }
    } else {
      setRows(data||[]);
      setDbReady(true);
    }
    setLoading(false);
  },[year]);

  useEffect(()=>{ load(); },[load]);

  const byMonth = useMemo(()=>{
    const m = Array.from({length:12},(_,i)=>({mo:i+1,income:0,total_expenses:0,net_profit:0,days:0}));
    rows.forEach(r=>{
      const x=m[r.mo-1];
      x.income+=+r.income; x.total_expenses+=+r.total_expenses; x.net_profit+=+r.net_profit; x.days++;
    });
    return m;
  },[rows]);

  const annual = useMemo(()=>byMonth.reduce((a,m)=>({
    income:a.income+m.income, total_expenses:a.total_expenses+m.total_expenses,
    net_profit:a.net_profit+m.net_profit, days:a.days+m.days
  }),{income:0,total_expenses:0,net_profit:0,days:0}),[byMonth]);

  async function importSeed(){
    const payload = SEED.map(([d,inc,net,pf,fe,wg])=>({
      user_id:uid,entry_date:d,income:inc,internet_exp:net,power_fuel:pf,feeding:fe,daily_wages:wg
    }));
    const {error} = await SB.from("daily_entries").upsert(payload,{onConflict:"user_id,entry_date"});
    if(error) flash("Import failed: "+error.message);
    else { flash("Imported "+payload.length+" workbook entries"); load(); }
  }

  if(!dbReady) return <SchemaSetup/>;

  const nav = [
    ["dashboard","Dashboard",I.dashboard],
    ["entry","Daily Entry",I.plus],
    ["monthly","Monthly",I.calendar],
    ["annual","Annual",I.chart],
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>

      {/* ── top bar ── */}
      <header style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"13px 24px",borderBottom:"1px solid var(--border)",
        position:"sticky",top:0,zIndex:30,backdropFilter:"blur(12px)",
        background:"rgba(8,12,16,.75)"
      }}>
        <Logo sm/>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span className="pill" style={{background:"rgba(32,219,184,.1)",color:"var(--teal)"}}>
            <span className="pulse">●</span> Live
          </span>
          <select value={year} onChange={e=>setYear(+e.target.value)}
            style={{background:"var(--panel2)",color:"var(--text)",border:"1px solid var(--border)",
              borderRadius:9,padding:"7px 11px",fontWeight:600,fontSize:13}}>
            {[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}
          </select>
          <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,var(--teal),var(--blue))",
            display:"grid",placeItems:"center",color:"#03120e",fontWeight:800,fontSize:13}}
            title={session.user.email}>
            {session.user.email[0].toUpperCase()}
          </div>
          <button className="btn ghost" style={{padding:"8px 10px"}} onClick={()=>SB.auth.signOut()} title="Sign out">
            <I.logout width={17} height={17}/>
          </button>
        </div>
      </header>

      <div style={{display:"flex",flex:1,minHeight:0}}>

        {/* ── sidebar ── */}
        <aside style={{width:210,borderRight:"1px solid var(--border)",padding:"18px 12px",
          display:"flex",flexDirection:"column",gap:4}}>
          {nav.map(([k,label,Icon])=>(
            <button key={k} onClick={()=>setView(k)}
              style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",borderRadius:9,
                fontSize:13.5,fontWeight:600,border:"none",textAlign:"left",transition:".15s",
                background: view===k?"var(--panel2)":"transparent",
                color: view===k?"var(--teal)":"var(--muted)"}}>
              <Icon width={17} height={17}/> {label}
            </button>
          ))}
          <div style={{flex:1}}/>
          <button onClick={importSeed}
            style={{display:"flex",alignItems:"center",gap:7,padding:"9px 12px",borderRadius:9,
              fontSize:12,fontWeight:600,border:"none",textAlign:"left",
              background:"transparent",color:"var(--muted2)"}}>
            ↑ Import workbook data
          </button>
        </aside>

        {/* ── content ── */}
        <main style={{flex:1,padding:"26px 28px",overflowY:"auto",minWidth:0}}>
          {loading
            ? <Center style={{minHeight:"50vh"}}><span className="spin" style={{borderTopColor:"var(--teal)",width:28,height:28,borderWidth:3}}/></Center>
            : <div className="fadein" key={view+year}>
                {view==="dashboard" && <ViewDashboard rows={rows} annual={annual} byMonth={byMonth} year={year}/>}
                {view==="entry"     && <ViewEntry rows={rows} uid={uid} year={year} onSaved={(t)=>{flash(t);load();}}/>}
                {view==="monthly"   && <ViewMonthly rows={rows} year={year}/>}
                {view==="annual"    && <ViewAnnual byMonth={byMonth} annual={annual} year={year}/>}
              </div>}
        </main>
      </div>

      <Toast msg={toast}/>
    </div>
  );
}

/* ─────────── DASHBOARD ─────────── */
function ViewDashboard({rows,annual,byMonth,year}){
  const margin = annual.income>0 ? annual.net_profit/annual.income*100 : 0;
  const recent = [...rows].sort((a,b)=>b.entry_date.localeCompare(a.entry_date)).slice(0,7);
  return <div>
    <PageTitle title="Business Overview" sub={`${year} · Hotzonex WiFi`}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14,marginBottom:22}}>
      <Kpi label="Total Income"    value={annual.income}         color="var(--blue)"/>
      <Kpi label="Total Expenses"  value={annual.total_expenses} color="var(--red)"/>
      <Kpi label="Net Profit"      value={annual.net_profit}     color="var(--gold)" big/>
      <Kpi label="Profit Margin"   value={margin}                color="var(--teal)" pct/>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1.7fr 1fr",gap:16}}>
      <div className="card" style={{padding:"20px 22px"}}>
        <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>Monthly Net Profit</div>
        <MiniBarChart data={byMonth}/>
      </div>
      <div className="card" style={{padding:"20px 22px"}}>
        <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Recent Days</div>
        {recent.length===0
          ? <p style={{color:"var(--muted2)",fontSize:13,paddingTop:20,textAlign:"center"}}>No entries yet.</p>
          : recent.map(r=>(
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"9px 0",borderBottom:"1px solid var(--border2)"}}>
              <div>
                <div style={{fontWeight:600,fontSize:13.5}}>{r.entry_date}</div>
                <div className="mono" style={{fontSize:11.5,color:"var(--muted)"}}>in {fmt(r.income)} · exp {fmt(r.total_expenses)}</div>
              </div>
              <div className="mono" style={{fontWeight:700,fontSize:14,color:r.net_profit>=0?"var(--gold)":"var(--red)"}}>{fmt(r.net_profit)}</div>
            </div>
          ))}
      </div>
    </div>
  </div>;
}

/* ─────────── DAILY ENTRY ─────────── */
function ViewEntry({rows,uid,year,onSaved}){
  const today = new Date().toISOString().slice(0,10);
  const defDate = today.startsWith(String(year)) ? today : year+"-01-01";
  const [date,setDate]   = useState(defDate);
  const [f,setF]         = useState({income:"",internet_exp:"",power_fuel:"",feeding:"",daily_wages:""});
  const [busy,setBusy]   = useState(false);
  const [delConfirm,setDelConfirm] = useState(false);
  const [rowDel,setRowDel]         = useState(null);
  const formRef = useRef(null);
  const blank = {income:"",internet_exp:"",power_fuel:"",feeding:"",daily_wages:""};

  useEffect(()=>{
    const ex = rows.find(r=>r.entry_date===date);
    setF(ex ? {income:ex.income,internet_exp:ex.internet_exp,power_fuel:ex.power_fuel,
               feeding:ex.feeding,daily_wages:ex.daily_wages} : blank);
    setDelConfirm(false);
  },[date,rows]);

  const n = v => Number(v||0);
  const totalExp = n(f.internet_exp)+n(f.power_fuel)+n(f.feeding)+n(f.daily_wages);
  const net      = n(f.income)-totalExp;
  const existing = rows.find(r=>r.entry_date===date);

  async function save(){
    setBusy(true);
    const {error} = await SB.from("daily_entries").upsert(
      {user_id:uid,entry_date:date,income:n(f.income),internet_exp:n(f.internet_exp),
       power_fuel:n(f.power_fuel),feeding:n(f.feeding),daily_wages:n(f.daily_wages)},
      {onConflict:"user_id,entry_date"}
    );
    setBusy(false);
    onSaved(error ? "Error: "+error.message : existing ? "Day updated ✓" : "Day saved ✓");
  }

  async function del(id,label){
    setBusy(true);
    const {error} = await SB.from("daily_entries").delete().eq("id",id);
    setBusy(false);
    setDelConfirm(false); setRowDel(null);
    if(!error && label) setF(blank);
    onSaved(error ? "Error: "+error.message : "Entry deleted"+(label?" — "+label:""));
  }

  const inputs = [
    ["income","Income (SSP)","var(--blue)"],
    ["internet_exp","Internet Exp.","var(--red)"],
    ["power_fuel","Power / Fuel","var(--red)"],
    ["feeding","Feeding / Maint.","var(--red)"],
    ["daily_wages","Daily Wages","var(--red)"],
  ];

  const list = [...rows].sort((a,b)=>b.entry_date.localeCompare(a.entry_date));

  return <div style={{maxWidth:860}}>
    <PageTitle title="Daily Entry" sub="Add, edit or delete a day — totals are auto-calculated"/>

    {/* form */}
    <div className="card" style={{padding:"24px 26px",marginBottom:24}} ref={formRef}>
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:14,marginBottom:20}}>
        <div className="field" style={{maxWidth:220,marginBottom:0}}>
          <label>Date</label>
          <input type="date" value={date} min={year+"-01-01"} max={year+"-12-31"} onChange={e=>setDate(e.target.value)}/>
        </div>
        <span className="pill" style={{
          background: existing?"rgba(245,200,66,.12)":"rgba(32,219,184,.1)",
          color: existing?"var(--gold)":"var(--teal)"}}>
          {existing ? "✎ Editing existing day" : "+ New day"}
        </span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}}>
        {inputs.map(([k,lbl,c])=>(
          <div className="field" key={k}>
            <label style={{color:c}}>{lbl}</label>
            <input className="right" inputMode="numeric" value={f[k]} placeholder="0"
              onChange={e=>setF({...f,[k]:e.target.value.replace(/[^\d.]/g,"")})}/>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:14,marginTop:20,flexWrap:"wrap"}}>
        {[["Total Expenses",totalExp,"var(--red)"],["Net Profit",net,net>=0?"var(--gold)":"var(--red)"]].map(([lbl,val,c])=>(
          <div key={lbl} style={{flex:1,minWidth:180,background:"var(--bg2)",border:"1px solid var(--border)",
            borderRadius:10,padding:"14px 16px"}}>
            <div style={{fontSize:11.5,color:"var(--muted)",fontWeight:600}}>{lbl}</div>
            <div className="mono" style={{fontSize:22,fontWeight:700,color:c,marginTop:4}}>{ssp(val)}</div>
            <div style={{fontSize:10.5,color:"var(--muted2)",marginTop:1}}>auto-calculated</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:20,flexWrap:"wrap"}}>
        <button className="btn primary" onClick={save} disabled={busy}>
          {busy ? <span className="spin"/> : existing ? <><I.edit width={14} height={14}/> Update</> : <><I.plus width={14} height={14}/> Save day</>}
        </button>
        {existing && !delConfirm &&
          <button className="btn danger" onClick={()=>setDelConfirm(true)} disabled={busy}>
            <I.trash width={14} height={14}/> Delete
          </button>}
        {existing && delConfirm &&
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,color:"var(--red)",fontWeight:600}}>Confirm delete?</span>
            <button className="btn" style={{background:"var(--red)",border:"none",color:"#1a0000",padding:"8px 14px"}}
              onClick={()=>del(existing.id,date)} disabled={busy}>Yes, delete</button>
            <button className="btn ghost" onClick={()=>setDelConfirm(false)}>Cancel</button>
          </div>}
        {!delConfirm &&
          <button className="btn ghost" onClick={()=>setDate(defDate)} disabled={busy}>Clear</button>}
      </div>
    </div>

    {/* saved entries list */}
    <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>
      Saved days · {year} ({list.length})
    </div>
    <div className="card" style={{overflowX:"auto"}}>
      {list.length===0
        ? <p style={{color:"var(--muted2)",fontSize:13,padding:"28px",textAlign:"center"}}>No entries yet for {year}.</p>
        : <table>
            <thead><tr><th>Date</th><th>Income</th><th>Total Exp.</th><th>Net Profit</th><th style={{textAlign:"right"}}>Actions</th></tr></thead>
            <tbody>
              {list.map(r=>(
                <tr key={r.id} style={r.entry_date===date?{background:"rgba(245,200,66,.05)"}:{}}>
                  <td style={{fontWeight:600}}>{r.entry_date}</td>
                  <td className="mono">{fmt(r.income)}</td>
                  <td className="mono" style={{color:"var(--muted)"}}>{fmt(r.total_expenses)}</td>
                  <td className="mono" style={{color:r.net_profit>=0?"var(--gold)":"var(--red)",fontWeight:700}}>{fmt(r.net_profit)}</td>
                  <td>
                    {rowDel===r.id
                      ? <span style={{display:"inline-flex",gap:6,justifyContent:"flex-end",alignItems:"center"}}>
                          <button className="btn" style={{padding:"5px 10px",fontSize:12,background:"var(--red)",border:"none",color:"#1a0000"}}
                            onClick={()=>del(r.id,r.entry_date)} disabled={busy}>Confirm</button>
                          <button className="btn ghost" style={{padding:"5px 10px",fontSize:12}} onClick={()=>setRowDel(null)}>Cancel</button>
                        </span>
                      : <span style={{display:"inline-flex",gap:5,justifyContent:"flex-end"}}>
                          <button className="btn ghost" style={{padding:"6px 8px"}} title="Edit" onClick={()=>{
                            setDate(r.entry_date);
                            formRef.current?.scrollIntoView({behavior:"smooth",block:"start"});
                          }}><I.edit width={14} height={14}/></button>
                          <button className="btn ghost" style={{padding:"6px 8px",color:"var(--red)"}} title="Delete"
                            onClick={()=>setRowDel(r.id)}><I.trash width={14} height={14}/></button>
                        </span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>}
    </div>
  </div>;
}

/* ─────────── MONTHLY ─────────── */
function ViewMonthly({rows,year}){
  const [mo,setMo] = useState(new Date().getMonth()+1);
  const moRows = rows.filter(r=>r.mo===mo).sort((a,b)=>a.dy-b.dy);
  const daysInMo = new Date(year,mo,0).getDate();

  const weeks = [];
  for(let d=1;d<=daysInMo;d++){
    const w=Math.floor((d-1)/7);
    (weeks[w]=weeks[w]||[]).push(d);
  }
  const rec = d => moRows.find(r=>r.dy===d);
  const sumW = (days,k) => days.reduce((a,d)=>a+Number(rec(d)?.[k]||0),0);
  const sumM = k => moRows.reduce((a,r)=>a+Number(r[k]),0);

  const cols = ["income","internet_exp","power_fuel","feeding","daily_wages","total_expenses","net_profit"];
  const heads = ["Date","Income","Internet","Power/Fuel","Feeding","Wages","Total Exp.","Net Profit"];

  return <div>
    <PageTitle title="Monthly Tracking" sub={MONTHS[mo-1]+" "+year}/>
    <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:18}}>
      {MONTHS.map((m,i)=>(
        <button key={m} onClick={()=>setMo(i+1)}
          style={{padding:"6px 12px",borderRadius:8,fontSize:12.5,fontWeight:600,border:"1px solid",
            borderColor: mo===i+1?"var(--teal2)":"var(--border)",
            background: mo===i+1?"var(--panel2)":"transparent",
            color: mo===i+1?"var(--teal)":"var(--muted)"}}>
          {m.slice(0,3)}
        </button>
      ))}
    </div>

    <div className="card" style={{overflowX:"auto"}}>
      <table>
        <thead><tr>{heads.map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>
          {weeks.map((days,wi)=>(
            <React.Fragment key={wi}>
              {days.map(d=>{
                const r=rec(d);
                return <tr key={d}>
                  <td style={{color:"var(--muted)"}}>{MONTHS[mo-1].slice(0,3)} {d}</td>
                  {cols.map(c=>(
                    <td key={c} className="mono" style={{
                      color: c==="net_profit"?(Number(r?.[c]||0)>=0?"var(--gold)":"var(--red)")
                           : c==="income"?"var(--text)":"var(--muted)"}}>
                      {r ? fmt(r[c]) : "—"}
                    </td>
                  ))}
                </tr>;
              })}
              <tr className="week-row">
                <td>Week {wi+1} total</td>
                {cols.map(c=><td key={c} className="mono">{fmt(sumW(days,c))}</td>)}
              </tr>
            </React.Fragment>
          ))}
          <tr className="total-row">
            <td>{MONTHS[mo-1]} total</td>
            {cols.map(c=>(
              <td key={c} className="mono" style={{
                color: c==="net_profit"?"var(--gold)":c==="income"?"var(--blue)":undefined}}>
                {fmt(sumM(c))}
              </td>
            ))}
          </tr>
        </tbody>
      </table>
    </div>
  </div>;
}

/* ─────────── mini SVG bar chart ─────────── */
function MiniBarChart({data,dual}){
  const W=520,H=200,pad=28,bw=W/12;
  const max = Math.max(1,...data.map(d=>Math.max(d.net_profit,dual?d.income:0,0)));
  const y = v => H-pad-(Math.max(0,v)/max)*(H-pad*2);
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
    {[0,.5,1].map(t=>(
      <line key={t} x1={pad} x2={W} y1={pad+(H-pad*2)*(1-t)} y2={pad+(H-pad*2)*(1-t)}
        stroke="var(--border2)" strokeWidth="1"/>
    ))}
    {data.map((d,i)=>{
      const cx=i*bw+pad/2;
      return <g key={i}>
        {dual && <rect x={cx} y={y(d.income)} width={bw*.32} height={H-pad-y(d.income)} rx="2" fill="var(--blue)" opacity=".5"/>}
        <rect x={cx+(dual?bw*.36:bw*.2)} y={y(d.net_profit)}
          width={bw*.32} height={Math.max(0,H-pad-y(d.net_profit))} rx="2" fill="var(--teal)"/>
        <text x={cx+bw*.3} y={H-8} fontSize="9" fill="var(--muted2)" textAnchor="middle"
          fontFamily="JetBrains Mono">{MONTHS[i][0]}</text>
      </g>;
    })}
  </svg>;
}

/* ─────────── ROOT ─────────── */
function Root(){
  const [session,setSession] = useState(null);
  const [ready,setReady]     = useState(false);

  useEffect(()=>{
    SB.auth.getSession().then(async({data})=>{
      const s = data.session;
      if(s?.user?.is_anonymous){ await SB.auth.signOut(); setSession(null); }
      else setSession(s||null);
      setReady(true);
    });
    const {data:sub} = SB.auth.onAuthStateChange(async(_,s)=>{
      if(s?.user?.is_anonymous){ await SB.auth.signOut(); setSession(null); return; }
      setSession(s||null);
    });
    return ()=>sub.subscription.unsubscribe();
  },[]);

  if(!ready) return <Center><span className="spin" style={{borderTopColor:"var(--teal)",width:28,height:28,borderWidth:3}}/></Center>;
  if(!session) return <Auth/>;
  return <App session={session}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
